<div class="login-page">

  <!-- Panneau gauche : branding -->
  <div class="brand-panel">
    <div class="brand-content">
      <div class="brand-logo">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      </div>
      <h1>FinTrack</h1>
      <p class="brand-desc">
        Pilote ton budget, catégorise tes transactions et suis tes objectifs d'épargne avec clarté.
      </p>
      <ul class="feature-list">
        <li>Vue mensuelle claire de tes finances</li>
        <li>Transactions catégorisées et filtrées</li>
        <li>Suivi des objectifs d'épargne</li>
      </ul>
    </div>
  </div>

  <!-- Panneau droit : formulaire -->
  <div class="form-panel">
    <div class="form-card">
      <h2>Connexion</h2>
      <p class="form-subtitle">Accède à ton tableau de bord personnel</p>

      <form (ngSubmit)="onSubmit()">
        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="ton@email.fr"
            required
          />
        </div>

        <div class="field">
          <label for="password">Mot de passe</label>
          <input
            id="password"
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            required
          />
        </div>

        @if (error) {
          <div class="error-alert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error }}
          </div>
        }

        <button type="submit" class="submit-btn" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Connexion...
          } @else {
            Se connecter
          }
        </button>
      </form>
    </div>
  </div>

</div>
