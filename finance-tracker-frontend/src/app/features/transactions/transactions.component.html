<div class="container py-4">
  <h2 class="mb-3">Transactions</h2>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="card-title">Nouvelle transaction</h5>
      <form class="row g-2" (ngSubmit)="createTransaction()">
        <div class="col-12 col-md-4">
          <label class="form-label">User ID *</label>
          <input
            class="form-control"
            type="text"
            [(ngModel)]="form.userId"
            name="createUserId"
            required
          />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Categorie (optionnel)</label>
          <select class="form-select" [(ngModel)]="form.categoryId" name="createCategoryId">
            <option value="">Aucune</option>
            <option *ngFor="let c of categories" [value]="c.id">
              {{ c.name }} ({{ c.categoryType }})
            </option>
          </select>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label">Type *</label>
          <select class="form-select" [(ngModel)]="form.transactionType" name="createType">
            <option *ngFor="let t of transactionTypes" [value]="t">{{ t }}</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">Montant *</label>
          <input
            class="form-control"
            type="number"
            min="0.01"
            step="0.01"
            [(ngModel)]="form.amount"
            name="createAmount"
            required
          />
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">Date *</label>
          <input
            class="form-control"
            type="datetime-local"
            [(ngModel)]="form.date"
            name="createDate"
            required
          />
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">Frequence</label>
          <select class="form-select" [(ngModel)]="form.frequency" name="createFrequency">
            <option value="">Aucune</option>
            <option *ngFor="let f of frequencies" [value]="f">{{ f }}</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label">Description</label>
          <input
            class="form-control"
            type="text"
            [(ngModel)]="form.description"
            name="createDescription"
          />
        </div>
        <div class="col-12">
          <button class="btn btn-primary" type="submit">Ajouter</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="d-flex flex-wrap gap-2 align-items-end mb-3">
        <div>
          <label class="form-label">Filtre userId</label>
          <input class="form-control" [(ngModel)]="filterUserId" name="filterUserId" />
        </div>
        <div>
          <label class="form-label">Filtre type</label>
          <select class="form-select" [(ngModel)]="filterType" name="filterType">
            <option value="">Tous</option>
            <option *ngFor="let t of transactionTypes" [value]="t">{{ t }}</option>
          </select>
        </div>
        <button class="btn btn-outline-primary" (click)="loadTransactions()">Filtrer</button>
      </div>

      <div *ngIf="loading" class="alert alert-info">Chargement...</div>
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <div class="table-responsive" *ngIf="!loading">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Montant</th>
              <th>Categorie</th>
              <th>Description</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let t of transactions">
              <td>{{ t.date | date: 'medium' }}</td>
              <td>{{ t.transactionType }}</td>
              <td>{{ t.amount | number: '1.2-2' }}</td>
              <td>{{ t.category?.name || '-' }}</td>
              <td>{{ t.description || '-' }}</td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-danger" (click)="deleteTransaction(t.id)">
                  Supprimer
                </button>
              </td>
            </tr>
            <tr *ngIf="!transactions.length">
              <td colspan="6" class="text-center text-muted">Aucune transaction.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
